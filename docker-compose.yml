# Two environments selected via Compose profiles:
#   Development:  docker compose --profile dev up      -> hot-reloading Vite on :5173
#   Production:   docker compose --profile prod up --build -> nginx-served bundle on :8080
#
# Vite loads the matching .env.<mode> file automatically (.env.development for the
# dev server, .env.production at build time for the prod image).

services:
  dev:
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules

  prod:
    build:
      context: .
      target: production
      args:
        BUILD_MODE: production
    profiles: ["prod"]
    ports:
      - "8080:80"
    restart: unless-stopped
